apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "mcp-oauth-proxy.labels" . | nindent 4 }}
data:
  config.toml: |
    [server]
    public_url = {{ .Values.server.publicUrl | quote }}
    host = {{ .Values.server.host | quote }}
    port = {{ .Values.server.port }}
    auth_code_ttl = {{ .Values.server.authCodeTtl }}
    # state_secret is injected via MCP_PROXY_STATE_SECRET env var
    state_secret = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

    {{- range $name, $ds := .Values.downstreams }}

    [downstream.{{ $name }}]
    display_name = {{ $ds.displayName | quote }}
    strategy = {{ $ds.strategy | quote }}
    downstream_url = {{ $ds.downstreamUrl | quote }}
    {{- if $ds.authHeaderFormat }}
    auth_header_format = {{ $ds.authHeaderFormat | quote }}
    {{- end }}
    {{- if $ds.scopes }}
    scopes = {{ $ds.scopes | quote }}
    {{- end }}
    {{- if eq $ds.strategy "passthrough" }}
    {{- if $ds.authHint }}
    auth_hint = {{ $ds.authHint | quote }}
    {{- end }}
    {{- end }}
    {{- if eq $ds.strategy "chained_oauth" }}
    {{- with $ds.oauth }}
    oauth_authorize_url = {{ .authorizeUrl | quote }}
    oauth_token_url = {{ .tokenUrl | quote }}
    oauth_client_id = {{ .clientId | quote }}
    # oauth_client_secret is injected via MCP_PROXY_<NAME>_CLIENT_SECRET env var
    oauth_client_secret = "placeholder"
    {{- if .scopes }}
    oauth_scopes = {{ .scopes | quote }}
    {{- end }}
    {{- if .supportsRefresh }}
    oauth_supports_refresh = true
    {{- end }}
    {{- if .tokenAccept }}
    oauth_token_accept = {{ .tokenAccept | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
