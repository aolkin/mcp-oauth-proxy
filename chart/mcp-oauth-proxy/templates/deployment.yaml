apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "mcp-oauth-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-oauth-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "mcp-oauth-proxy.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/mcp-oauth-proxy/config.toml
          env:
            - name: RUST_LOG
              value: info
            - name: MCP_PROXY_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.server.stateSecretRef.name }}
                  name: {{ .Values.server.stateSecretRef.name }}
                  key: {{ .Values.server.stateSecretRef.key }}
                  {{- else }}
                  name: {{ .Release.Name }}
                  key: state-secret
                  {{- end }}
            {{- range $name, $ds := .Values.downstreams }}
            {{- if eq $ds.strategy "chained_oauth" }}
            - name: MCP_PROXY_{{ $name | upper | replace "-" "_" }}_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if and $ds.oauth $ds.oauth.clientSecretRef }}
                  name: {{ $ds.oauth.clientSecretRef.name }}
                  key: {{ $ds.oauth.clientSecretRef.key }}
                  {{- else }}
                  name: {{ $.Release.Name }}
                  key: {{ $name }}-client-secret
                  {{- end }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/mcp-oauth-proxy
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
