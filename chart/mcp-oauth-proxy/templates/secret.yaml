{{- if not .Values.server.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-oauth-proxy.fullname" . }}
  labels:
    {{- include "mcp-oauth-proxy.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.server.stateSecret }}
  state-secret: {{ .Values.server.stateSecret | b64enc | quote }}
  {{- end }}
  {{- range $name, $ds := .Values.downstreams }}
  {{- if and (eq $ds.strategy "chained_oauth") $ds.oauth $ds.oauth.clientSecret }}
  {{ $name }}-client-secret: {{ $ds.oauth.clientSecret | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
