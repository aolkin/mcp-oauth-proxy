{{- $hasStateSecret := and .Values.server.stateSecret (not .Values.server.stateSecretRef.name) -}}
{{- $clientSecrets := dict -}}
{{- range $name, $ds := .Values.downstreams -}}
{{- if and (eq $ds.strategy "chained_oauth") $ds.oauth $ds.oauth.clientSecret (not $ds.oauth.clientSecretRef) -}}
{{- $_ := set $clientSecrets $name $ds.oauth.clientSecret -}}
{{- end -}}
{{- end -}}
{{- if or $hasStateSecret $clientSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-oauth-proxy.fullname" . }}
  labels:
    {{- include "mcp-oauth-proxy.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $hasStateSecret }}
  state-secret: {{ .Values.server.stateSecret | b64enc | quote }}
  {{- end }}
  {{- range $name, $secret := $clientSecrets }}
  {{ $name }}-client-secret: {{ $secret | b64enc | quote }}
  {{- end }}
{{- end }}
